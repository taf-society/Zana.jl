<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="owlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon points="256,16 472,136 472,376 256,496 40,376 40,136" fill="url(#bg)"/>

  <!-- Subtle glow behind owl -->
  <ellipse cx="256" cy="270" rx="120" ry="130" fill="url(#glow)"/>

  <!-- Owl body -->
  <ellipse cx="256" cy="290" rx="95" ry="110" fill="url(#owlBody)" opacity="0.9"/>

  <!-- Ear tufts -->
  <polygon points="190,195 175,135 215,180" fill="#a78bfa"/>
  <polygon points="322,195 337,135 297,180" fill="#a78bfa"/>

  <!-- Head -->
  <ellipse cx="256" cy="210" rx="80" ry="65" fill="url(#owlBody)"/>

  <!-- Eye rings -->
  <circle cx="224" cy="205" r="28" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="288" cy="205" r="28" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="224" cy="205" r="25" fill="#e0e7ff"/>
  <circle cx="288" cy="205" r="25" fill="#e0e7ff"/>

  <!-- Irises — amber/gold for wisdom -->
  <circle cx="224" cy="205" r="14" fill="#f59e0b"/>
  <circle cx="288" cy="205" r="14" fill="#f59e0b"/>

  <!-- Pupils -->
  <circle cx="226" cy="203" r="7" fill="#1a1a2e"/>
  <circle cx="290" cy="203" r="7" fill="#1a1a2e"/>

  <!-- Eye highlights -->
  <circle cx="220" cy="199" r="3.5" fill="#fff" opacity="0.9"/>
  <circle cx="284" cy="199" r="3.5" fill="#fff" opacity="0.9"/>

  <!-- Beak -->
  <polygon points="256,222 248,238 264,238" fill="#f59e0b" opacity="0.9"/>

  <!-- Code bracket wings: { on left, } on right -->
  <!-- Left bracket { -->
  <text x="120" y="320" font-family="'JetBrains Mono','Fira Code','SF Mono',monospace" font-size="100" font-weight="700" fill="#c4b5fd" opacity="0.7">{</text>
  <!-- Right bracket } -->
  <text x="340" y="320" font-family="'JetBrains Mono','Fira Code','SF Mono',monospace" font-size="100" font-weight="700" fill="#c4b5fd" opacity="0.7">}</text>

  <!-- Terminal cursor blinking at bottom -->
  <rect x="243" y="375" width="26" height="4" rx="2" fill="#22d3ee" opacity="0.8"/>

  <!-- Subtle chest chevron pattern -->
  <polyline points="236,280 256,300 276,280" fill="none" stroke="#e0e7ff" stroke-width="2" opacity="0.3"/>
  <polyline points="236,295 256,315 276,295" fill="none" stroke="#e0e7ff" stroke-width="2" opacity="0.2"/>
</svg>